<div class="container">
    <h1>Reports</h1>

    <div class="card">
        <h3>Monthly Reservations</h3>
        <div id="monthlyReservations">Loading...</div>
    </div>

    <div class="card">
        <h3>Popular Package</h3>
        <p id="popularPackage">Loading...</p>
    </div>
</div>
<script>
fetch('reports_data.php')
    .then(res => res.json())
    .then(data => {
        if (data.status === 'success') {
            const monthly = document.getElementById('monthlyReservations');
            monthly.innerHTML = data.data.monthly_reservations.length
                ? data.data.monthly_reservations.map(row => `<p>${row.month}: ${row.total} bookings</p>`).join('')
                : '<p>No reservation history yet.</p>';
            document.getElementById('popularPackage').textContent = data.data.popular_package || 'No data yet';
        } else {
            document.getElementById('monthlyReservations').innerHTML = '<p>Unable to load report.</p>';
            document.getElementById('popularPackage').textContent = 'Unable to load report.';
        }
    })
    .catch(() => {
        document.getElementById('monthlyReservations').innerHTML = '<p>Unable to load report.</p>';
        document.getElementById('popularPackage').textContent = 'Unable to load report.';
    });
</script>
