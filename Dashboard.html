<div class="container">
    <h1>Dashboard</h1>

    <div class="card">
        <h3>Total Reservations</h3>
        <p id="totalReservations">Loading...</p>
    </div>

    <div class="card">
        <h3>Upcoming Events</h3>
        <p id="upcomingEvents">Loading...</p>
    </div>

    <div class="card">
        <h3>Pending Requests</h3>
        <p id="pendingRequests">Loading...</p>
    </div>
</div>
<script>
fetch('dashboard_data.php')
    .then(res => res.json())
    .then(data => {
        if (data.status === 'success') {
            document.getElementById('totalReservations').textContent = data.data.total_reservations;
            document.getElementById('upcomingEvents').textContent = data.data.upcoming_events;
            document.getElementById('pendingRequests').textContent = data.data.pending_requests;
        } else {
            document.getElementById('totalReservations').textContent = 'Error';
            document.getElementById('upcomingEvents').textContent = 'Error';
            document.getElementById('pendingRequests').textContent = 'Error';
        }
    })
    .catch(() => {
        document.getElementById('totalReservations').textContent = 'Error';
        document.getElementById('upcomingEvents').textContent = 'Error';
        document.getElementById('pendingRequests').textContent = 'Error';
    });
</script>
